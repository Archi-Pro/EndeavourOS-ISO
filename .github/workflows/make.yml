name: Build :re.OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup EndeavourOS Mirrors & Dependencies
        run: |
          # ۱. آپدیت کلیدها و سیستم پایه آرچ
          pacman -Syu --noconfirm
          pacman -S --noconfirm git wget squashfs-tools archiso dosfstools libisoburn lynx cpio dracut

          # ۲. ساخت مستقیم فایل میرورها با سرورهای پایدار و اصلی جهانی EOS
          mkdir -p /etc/pacman.d
          cat << 'EOF' > /etc/pacman.d/endeavouros-mirrorlist
          Server = https://mirror.alwyzon.net/endeavouros/repo/$repo/$arch
          Server = https://de.mirror.endeavouros.com/repo/$repo/$arch
          Server = https://mirror.linux.net.nu/endeavouros/repo/$repo/$arch
          Server = https://mirror.moson.org/endeavouros/repo/$repo/$arch
          EOF

          # ۳. معرفی مخزن EndeavourOS به pacman با استفاده از لیست میرورها
          echo -e "\n[endeavouros]\nSigLevel = PackageOptional\nInclude = /etc/pacman.d/endeavouros-mirrorlist" >> /etc/pacman.conf
          
          # ۴. همگام‌سازی و آپدیت مخازن
          pacman -Sy --noconfirm

      - name: Prepare ISO Structure
        run: |
          chmod +x prepare.sh
          ./prepare.sh

      - name: Run Build (mkarchiso)
        run: |
          sudo ./mkarchiso -v "."

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: re-OS-Live-ISO
          path: out/*.iso
          if-no-files-found: error
          retention-days: 5
