name: Build :re.OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup EndeavourOS Mirrors & Dependencies
        run: |
          # ۱. به‌روزرسانی مخازن پایه آرچ و نصب تمام ابزارهای مورد نیاز سیستم و بیلد
          pacman -Syu --noconfirm
          pacman -S --noconfirm git wget squashfs-tools archiso dosfstools libisoburn lynx cpio dracut sudo fakeroot debugedit binutils

          # ۲. ساخت فایل لیست میرورهای رسمی و پایدار جهانی EndeavourOS
          mkdir -p /etc/pacman.d
          cat << 'EOF' > /etc/pacman.d/endeavouros-mirrorlist
          Server = https://mirror.alwyzon.net/endeavouros/repo/$repo/$arch
          Server = https://de.mirror.endeavouros.com/repo/$repo/$arch
          Server = https://mirror.linux.net.nu/endeavouros/repo/$repo/$arch
          Server = https://mirror.moson.org/endeavouros/repo/$repo/$arch
          EOF

          # ۳. معرفی مخزن اختصاصی EndeavourOS به تنظیمات pacman
          echo -e "\n[endeavouros]\nSigLevel = PackageOptional\nInclude = /etc/pacman.d/endeavouros-mirrorlist" >> /etc/pacman.conf
          
          # ۴. راه‌اندازی و هماهنگ‌سازی کلیدهای PGP برای رفع ارور تایید امضا (Unknown Trust)
          pacman-key --init
          pacman-key --populate archlinux
          
          # دریافت و تایید رسمی کلید دیجیتال توسعه‌دهنده اصلی مخازن (manuel)
          pacman-key --recv-keys A367FB01AE54040E --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key A367FB01AE54040E

          # ۵. همگام‌سازی نهایی تمام مخازن سیستم
          pacman -Sy --noconfirm

          # ۶. ساخت کاربر غیر روت 'builder' جهت اجرای ایمن دستور makepkg در مرحله بعد
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # تغییر مالکیت پوشه پروژه به کاربر جدید برای دسترسی کامل
          chown -R builder:builder ./

      - name: Prepare ISO Structure (As Non-Root)
        run: |
          chmod +x prepare.sh
          # اجرای اسکریپت آماده‌سازی با کاربر غیر روت جهت دور زدن محدودیت امنیتی
          su builder -c "./prepare.sh"

      - name: Run Build (mkarchiso As Root)
        run: |
          # اجرای کامپایل و ساخت نهایی ایمیج با ابزار رسمی آرچ‌ایزو (دسترسی روت الزامی است)
          ./mkarchiso -v "."

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: re-OS-Live-ISO
          path: out/*.iso
          if-no-files-found: error
          retention-days: 5
